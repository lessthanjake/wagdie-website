```typescript
// types/character.ts
export type { Character, CharacterConcord, CharacterFilters }

// types/tweet.ts
export type { Tweet, TweetFilters }

// types/chat.ts
export type { ChatMessage, UserPresence, Location }

// types/wallet.ts
export type { UserSession, TransactionReceipt }
```

## Validation Schemas (Zod)

For runtime validation, use Zod schemas:

```typescript
// lib/validation/character.schema.ts
import { z } from 'zod'

export const CharacterSchema = z.object({
  token_id: z.number().int().min(1).max(6666),
  owner_address: z.string().regex(/^0x[a-fA-F0-9]{40}$/),
  level: z.number().int().min(1).max(20),
  // ... all fields from data-model.md
})

export const UpdateCharacterSchema = z.object({
  background_story: z.string().max(5000).optional(),
  equipment: z.record(z.any()).optional(),
})

// Use in API routes
export type Character = z.infer<typeof CharacterSchema>
export type UpdateCharacterInput = z.infer<typeof UpdateCharacterSchema>
```

## Notes

1. **Strict TypeScript**: All components use explicit prop interfaces, no `any` types
2. **Nullable handling**: Use `| null` for nullable fields, `?` for optional props
3. **Enums**: Use string literal unions for status/type fields
4. **Validation**: API routes validate inputs with Zod before processing
5. **Error types**: All async operations should use try/catch with typed errors
6. **React Query**: Use typed hooks for data fetching (`useQuery<Character[]>`)
7. **wagmi hooks**: All blockchain calls use typed wagmi hooks with proper generics
