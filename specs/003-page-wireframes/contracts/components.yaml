}
```

### wallet-service.ts
```typescript
interface WalletService {
  burnCorpses(amount: number): Promise<TransactionReceipt>
  spreadInfections(amount: number): Promise<TransactionReceipt>
  infectWagdie(tokenId: number, value: bigint): Promise<TransactionReceipt>
  cureCharacter(tokenId: number): Promise<TransactionReceipt>
  searConcord(tokenId: number, concordId: number): Promise<TransactionReceipt>
  getCorpseBalance(address: string): Promise<number>
  getMushroomBalance(tokenId: number): Promise<number>
  getInfectionPrice(): Promise<bigint>
}

interface TransactionReceipt {
  hash: string
  status: 'success' | 'reverted'
  blockNumber: number
}
```

## Custom Hooks

### useCurrentUser
```typescript
function useCurrentUser(): {
  user: UserSession | null
  isLoading: boolean
  error: Error | null
}
```

### useCharacterLocation
```typescript
function useCharacterLocation(tokenId: number): {
  location: Location | null
  isLoading: boolean
  error: Error | null
}
```

### useInfiniteScroll
```typescript
function useInfiniteScroll<T>(
  fetchFn: (page: number) => Promise<{items: T[], hasMore: boolean}>,
  options?: {
    initialPage?: number
    enabled?: boolean
  }
): {
  data: T[]
  hasMore: boolean
  isLoading: boolean
  loadMore: () => void
  error: Error | null
}
```

### useWebSocket (Firebase)
```typescript
function useWebSocket<T>(
  path: string,
  options?: {
    enabled?: boolean
  }
): {
  data: T | null
  isConnected: boolean
  error: Error | null
}
```

