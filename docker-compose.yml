services:
  studio:
    image: supabase/studio:20231123-64a766a
    restart: unless-stopped
    ports:
      - "3012:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8010:8000"
      - "8453:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
    volumes:
      - ./volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - default
      - homelab_homelab

  auth:
    image: supabase/gotrue:v2.99.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8010
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3001
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_SENDER_NAME: admin@example.com
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

  rest:
    image: postgrest/postgrest:v11.2.0
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  realtime:
    image: supabase/realtime:v2.25.35
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"

  storage:
    image: supabase/storage-api:v0.40.4
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - ./volumes/storage:/var/lib/storage:z

  meta:
    image: supabase/postgres-meta:v0.68.0
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  db:
    image: supabase/postgres:15.1.0.117
    restart: unless-stopped
    ports:
      - "5442:5432"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      - ./volumes/db/init:/docker-entrypoint-initdb.d:Z

  elizaos-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${ELIZA_POSTGRES_USER:-elizaos}
      POSTGRES_PASSWORD: ${ELIZA_POSTGRES_PASSWORD:?Set ELIZA_POSTGRES_PASSWORD for the dedicated ElizaOS Postgres}
      POSTGRES_DB: ${ELIZA_POSTGRES_DB:-elizaos}
    volumes:
      - elizaos-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-elizaos} -d $${POSTGRES_DB:-elizaos}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - default

  elizaos:
    build:
      context: ./services/elizaos
      dockerfile: Dockerfile
    depends_on:
      elizaos-db:
        condition: service_healthy
    ports:
      - "${ELIZAOS_HOST_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      ELIZAOS_ENV: ${ELIZAOS_ENV:-production}
      PORT: 3001
      HOST: 0.0.0.0
      DISABLE_WEB_UI: "true"
      ELIZAOS_DATA_DIR: /app/data
      DATABASE_URL: postgres://${ELIZA_POSTGRES_USER:-elizaos}:${ELIZA_POSTGRES_PASSWORD:?Set ELIZA_POSTGRES_PASSWORD for the dedicated ElizaOS Postgres}@elizaos-db:5432/${ELIZA_POSTGRES_DB:-elizaos}
      POSTGRES_URL: postgres://${ELIZA_POSTGRES_USER:-elizaos}:${ELIZA_POSTGRES_PASSWORD:?Set ELIZA_POSTGRES_PASSWORD for the dedicated ElizaOS Postgres}@elizaos-db:5432/${ELIZA_POSTGRES_DB:-elizaos}
      ELIZA_SERVER_AUTH_TOKEN: ${ELIZA_SERVER_AUTH_TOKEN:?Set ELIZA_SERVER_AUTH_TOKEN for WAGDIE app to ElizaOS auth}
      WAGDIE_KNOWLEDGE_INGESTION_TOKEN: ${WAGDIE_KNOWLEDGE_INGESTION_TOKEN:?Set WAGDIE_KNOWLEDGE_INGESTION_TOKEN for ElizaOS knowledge ingestion}
      WAGDIE_KNOWLEDGE_ALLOW_UNAUTHENTICATED_LOCAL: "false"
      SERVER_API_KEY: ${SERVER_API_KEY:?Set SERVER_API_KEY for ElizaOS runtime auth}
      VENICE_API_KEY: ${VENICE_API_KEY:?Set VENICE_API_KEY in the ElizaOS service secret store}
      VENICE_BASE_URL: ${VENICE_BASE_URL:-https://api.venice.ai/api/v1}
      VENICE_SMALL_MODEL: ${VENICE_SMALL_MODEL:-venice-uncensored-role-play}
      VENICE_LARGE_MODEL: ${VENICE_LARGE_MODEL:-venice-uncensored-role-play}
      VENICE_EMBEDDING_MODEL: ${VENICE_EMBEDDING_MODEL:-text-embedding-bge-m3}
      VENICE_EMBEDDING_DIMENSIONS: ${VENICE_EMBEDDING_DIMENSIONS:-1024}
    volumes:
      - elizaos-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3001/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - default
      - homelab_homelab
    restart: unless-stopped

  inbucket:
    image: inbucket/inbucket:stable
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "2510:2500"
    environment:
      INBUCKET_WEB_ADDR: 0.0.0.0:9000
      INBUCKET_SMTP_ADDR: 0.0.0.0:2500
      INBUCKET_POP3_ADDR: 0.0.0.0:1100

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "42069:3000"
    depends_on:
      kong:
        condition: service_started
      elizaos:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8010
      ELIZA_INTEGRATION_MODE: ${ELIZA_INTEGRATION_MODE:-legacy}
      ELIZAOS_BASE_URL: ${ELIZAOS_BASE_URL:-http://elizaos:3001}
      ELIZAOS_API_KEY: ${ELIZA_SERVER_AUTH_TOKEN:-}
      ELIZAOS_HEALTH_PATH: ${ELIZAOS_HEALTH_PATH:-/api/server/health}
    networks:
      - default
      - homelab_homelab
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: scripts/indexer/Dockerfile
    depends_on:
      - kong
    environment:
      WS_RPC_URL: ${WS_RPC_URL}
      NEXT_PUBLIC_SUPABASE_URL: https://wagdie-api.runiverse.ai
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STATE_FILE: /app/data/state.json
      CHAIN_ID: 1
      START_BLOCK: 15422334
    volumes:
      - indexer-data:/app/data
    networks:
      - default
    restart: unless-stopped

  infection-indexer:
    build:
      context: .
      dockerfile: scripts/indexer/Dockerfile
    command: ["npx", "tsx", "scripts/indexer/infection-indexer.ts"]
    depends_on:
      - kong
    environment:
      WS_RPC_URL: ${WS_RPC_URL}
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STATE_FILE: /app/data/infection-state.json
      CHAIN_ID: 1
      START_BLOCK: 15422334
    volumes:
      - infection-indexer-data:/app/data
    networks:
      - default
    restart: unless-stopped

  searing-indexer:
    build:
      context: .
      dockerfile: scripts/indexer/Dockerfile
    command: ["npx", "tsx", "scripts/indexer/searing-indexer.ts"]
    depends_on:
      - kong
    environment:
      WS_RPC_URL: ${WS_RPC_URL}
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STATE_FILE: /app/data/searing-state.json
      CHAIN_ID: 1
      START_BLOCK: 15422334
    volumes:
      - searing-indexer-data:/app/data
    networks:
      - default
    restart: unless-stopped

  staking-indexer:
    build:
      context: .
      dockerfile: scripts/indexer/Dockerfile
    command: ["npx", "tsx", "scripts/indexer/staking-indexer.ts"]
    depends_on:
      - kong
    environment:
      WS_RPC_URL: ${WS_RPC_URL}
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${ANON_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STATE_FILE: /app/data/staking-state.json
      CHAIN_ID: 1
      START_BLOCK: 15422334
    volumes:
      - staking-indexer-data:/app/data
    networks:
      - default
    restart: unless-stopped

  concord-indexer:
    build:
      context: .
      dockerfile: scripts/indexer/Dockerfile
    command: ["npx", "tsx", "scripts/indexer/concord-indexer.ts"]
    depends_on:
      - kong
    environment:
      WS_RPC_URL: ${WS_RPC_URL}
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      STATE_FILE: /app/data/concord-state.json
      CHAIN_ID: 1
      START_BLOCK: 15400000
    volumes:
      - concord-indexer-data:/app/data
    networks:
      - default
    restart: unless-stopped

  discord-notifier:
    build:
      context: .
      dockerfile: scripts/discord/Dockerfile
    depends_on:
      - kong
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      # Discord webhook URLs (configure per event type)
      DISCORD_WEBHOOK_TRANSFERS: ${DISCORD_WEBHOOK_TRANSFERS:-}
      DISCORD_WEBHOOK_BURNS: ${DISCORD_WEBHOOK_BURNS:-}
      DISCORD_WEBHOOK_TRAVEL: ${DISCORD_WEBHOOK_TRAVEL:-}
      DISCORD_WEBHOOK_SEARING: ${DISCORD_WEBHOOK_SEARING:-}
      DISCORD_WEBHOOK_CONCORD_TRANSFERS: ${DISCORD_WEBHOOK_CONCORD_TRANSFERS:-}
      # Optional: Use JSON format for all webhooks at once
      # DISCORD_WEBHOOKS_JSON: ${DISCORD_WEBHOOKS_JSON:-}
      # Display settings
      DISCORD_WEBHOOK_USERNAME: ${DISCORD_WEBHOOK_USERNAME:-WAGDIE Events}
      DISCORD_WEBHOOK_AVATAR_URL: ${DISCORD_WEBHOOK_AVATAR_URL:-}
      PUBLIC_ASSET_BASE_URL: ${PUBLIC_ASSET_BASE_URL:-}
      # Polling settings
      DISCORD_OUTBOX_POLL_MS: ${DISCORD_OUTBOX_POLL_MS:-2000}
      DISCORD_OUTBOX_BATCH_SIZE: ${DISCORD_OUTBOX_BATCH_SIZE:-25}
      DISCORD_OUTBOX_MAX_ATTEMPTS: ${DISCORD_OUTBOX_MAX_ATTEMPTS:-8}
    networks:
      - default
    restart: unless-stopped

networks:
  homelab_homelab:
    external: true

volumes:
  db-data:
  indexer-data:
  infection-indexer-data:
  searing-indexer-data:
  staking-indexer-data:
  concord-indexer-data:
  elizaos-db-data:
  elizaos-data:
